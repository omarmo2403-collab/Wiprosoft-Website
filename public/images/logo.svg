<svg width="512" height="384" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 384">
  <!-- W Mark - Navy Blue -->
  <g id="w-mark">
    <!-- Left V of W -->
    <path d="M 36 78 Q 36 168 96 228 Q 108 240 120 228 Q 156 168 156 78" fill="#172F56" stroke="none"/>
    <!-- Center V of W -->
    <path d="M 120 228 Q 120 288 180 318 Q 192 324 204 318 Q 264 288 264 228" fill="#172F56" stroke="none"/>
    <!-- Right V of W -->
    <path d="M 204 228 Q 204 156 264 78" fill="none" stroke="#172F56" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- S Mark - Teal/Cyan -->
  <g id="s-mark">
    <!-- Top curve of S -->
    <path d="M 324 78 Q 324 78 396 110 Q 432 128 432 164 Q 432 192 400 204 Q 368 216 336 216 L 960 216" fill="#03A3B2" stroke="none"/>
    <!-- Bottom curve of S -->
    <path d="M 960 252 L 336 252 Q 368 252 400 264 Q 432 276 432 304 Q 432 340 396 358 Q 324 390 324 390 Q 366 374 408 350 Q 444 330 444 290 Q 444 250 408 230 Q 372 210 336 210 Q 354 202 370 190" fill="#03A3B2" stroke="none"/>
    <!-- Top bar -->
