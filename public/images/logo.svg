    <!-- Bottom bar -->
    <rect x="336" y="250" width="112" height="24" rx="12" fill="#03A3B2"/>
  </g>
  
  <!-- Text: WIPROSOFT -->
  <g id="text" font-family="Arial, sans-serif" font-size="96" font-weight="bold" letter-spacing="8">
    <!-- WIPRO in Navy -->
